<!DOCTYPE html>
<html>
<head>
    <title>AI Text Corrector</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial;
            background: #0f0f1a;
            color: #e6e6fa;
            padding: 40px;
        }

        h2 {
            text-align: center;
            color: #c8a2ff;
        }

        textarea {
            width: 100%;
            height: 140px;
            padding: 15px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: #1a1a2e;
            color: #ffffff;
            font-size: 15px;
        }

        button {
            padding: 12px 25px;
            margin-top: 15px;
            background: linear-gradient(45deg, #9f70ff, #c8a2ff);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .output {
            margin-top: 25px;
            background: #1a1a2e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(200,162,255,0.2);
        }

        h3 {
            color: #c8a2ff;
        }

        p {
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">

<h2>✨ AI Grammar Corrector & Paraphraser ✨</h2>

<textarea id="inputText" placeholder="Type your sentence here..."></textarea>
<br>
<button onclick="processText()">✨ Process Text</button>

<div class="output">
    <h3>✅ Corrected Text:</h3>
    <p id="corrected"></p>

    <h3>🔁 Paraphrased Text:</h3>
    <p id="paraphrased"></p>
</div>

</div>

<script>
async function processText() {
    let text = document.getElementById("inputText").value;

    try {
        let response = await fetch('/process', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ text: text })
        });

        let data = await response.json();

        document.getElementById("corrected").innerText = data.corrected || "No output";
        document.getElementById("paraphrased").innerText = data.paraphrased || "No output";

    } catch (error) {
        alert("Server error. Check terminal.");
        console.error(error);
    }
}
</script>

</body>
</html>
